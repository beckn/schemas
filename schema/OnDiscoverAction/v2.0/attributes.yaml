$id: "https://schema.beckn.io/OnDiscoverAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_discover callback envelope. Sent by a BPP to a BAP in response to a /beckn/discover call, containing
  matching catalogs.

  '
title: OnDiscoverAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context.yaml"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_discover
  message:
    type: object
    additionalProperties: true
    properties:
      catalogs:
        type: array
        items:
          $ref: "https://schema.beckn.io/Catalog.yaml"
    required:
    - catalogs
required:
- context
- message
