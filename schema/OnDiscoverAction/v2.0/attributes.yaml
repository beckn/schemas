openapi: 3.1.1
info:
  title: OnDiscoverAction
  version: 2.0.0
  description: 'Beckn /beckn/on_discover message payload. Sent by a BPP or CDS to
    a BAP

    in response to a discover request. Contains matching catalogs.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    OnDiscoverAction:
      description: The on_discover response payload containing matching catalogs.
      type: object
      required:
      - catalogs
      properties:
        catalogs:
          type: array
          description: 'Array of catalogs matching the discovery request.

            Array of catalogs matching the discovery request.'
          items:
            $ref: https://schema.beckn.io/Catalog/v2.1/attributes.yaml#/components/schemas/Catalog
      additionalProperties: false
