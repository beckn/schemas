openapi: 3.1.1
info:
  title: Beckn OnDiscoverAction Schema
  description: Schema definition for the Beckn /beckn/on_discover callback envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    OnDiscoverAction:
      description: >
        Beckn /beckn/on_discover callback envelope. Sent by a BPP to a BAP in
        response to a /beckn/discover call, containing matching catalogs.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/on_discover
        message:
          type: object
          additionalProperties: true
          properties:
            catalogs:
              type: array
              items:
                $ref: 'https://schema.beckn.io/Catalog.yaml'
          required:
            - catalogs
      required:
        - context
        - message
