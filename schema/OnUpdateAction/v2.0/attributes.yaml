$id: "https://schema.beckn.io/OnUpdateAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_update callback envelope. Sent by a BPP to a BAP in response to a /beckn/update call (or as
  an unsolicited update push), returning the updated contract state.

  '
title: OnUpdateAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_update
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract/v2.0"
    required:
    - contract
required:
- context
- message
