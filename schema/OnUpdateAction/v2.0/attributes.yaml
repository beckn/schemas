openapi: 3.1.1
info:
  title: Beckn OnUpdateAction Schema
  description: Schema definition for the Beckn /beckn/on_update callback envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    OnUpdateAction:
      description: >
        Beckn /beckn/on_update callback envelope. Sent by a BPP to a BAP in
        response to a /beckn/update call (or as an unsolicited update push),
        returning the updated contract state.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/on_update
        message:
          type: object
          additionalProperties: true
          properties:
            contract:
              allOf:
                - $ref: 'https://schema.beckn.io/Contract.yaml'
          required:
            - contract
      required:
        - context
        - message
