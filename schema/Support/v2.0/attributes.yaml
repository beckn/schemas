$id: https://schema.beckn.io/Support/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: >
  Support request payload sent by a BAP to a BPP in the /beckn/support call.
  Used to request support contact information, report an issue, or open a
  support ticket for an existing order.
title: Support
x-tags: [common]
type: object
properties:
  '@context':
    type: string
    format: uri
    const: "https://schema.beckn.io/"
  '@type':
    type: string
    const: Support
  orderId:
    description: The order against which support is required.
    type: string
  ticketIds:
    description: IDs of existing support tickets (if open) for this order.
    type: array
    items:
      $ref: https://schema.beckn.io/SupportTicket/v2.0#/properties/id
  callbackPhone:
    description: Telephone number of the user for a support callback.
    type: string
  issue:
    description: Free-text description of the issue requiring support.
    type: string
  issueCode:
    description: Structured issue category code (domain-defined).
    type: string
required:
- '@context'
- '@type'
additionalProperties: false
