openapi: 3.1.1
info:
  title: Support
  version: 2.0.0
  description: 'Support request payload sent by a BAP to a BPP in the /beckn/support
    call. Used to request support contact information, report an issue, or open a
    support ticket for an existing order.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    Support:
      description: Describes a support session info
      title: Support
      type: object
      properties:
        orderId:
          description: The order against which support is required
          type: string
        descriptor:
          description: A description of the nature of support needed
          $ref: https://schema.beckn.io/Descriptor/v2.1/attributes.yaml#/components/schemas/Descriptor
        channels:
          description: Available support channels described in individual linked data
            JSON objects
          type: array
          minItems: 1
          items:
            $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
      additionalProperties: false
