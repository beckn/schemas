openapi: 3.1.1
info:
  title: Beckn Attributes Schema
  description: Schema definition for Attributes in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Attributes:
      description: JSON-LD aware container for domain-specific attributes of an Item.
        MUST include @context (URI) and @type (compact or full IRI). Any additional
        properties are allowed and interpreted per the provided JSON-LD context.
      type: object
      properties:
        '@context':
          description: Use case specific JSON-LD context URI
          type: string
          format: uri
          example: https://example.org/schema/items/v1/ElectronicItem/schema-context.jsonld
        '@type':
          description: JSON-LD type defined within the context
          type: string
          example: ElectronicItem
      required:
      - '@context'
      - '@type'
      additionalProperties: true
