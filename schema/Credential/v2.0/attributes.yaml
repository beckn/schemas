openapi: 3.1.1
info:
  title: Beckn Credential Schema
  description: Schema definition for Credential in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Credential:
      description: A credential artifact that is either (a) a W3C Verifiable Credential (opaque JSON object)
        or (b) a document attachment reference requiring manual/offline verification.
      oneOf:
        - title: W3C Verifiable Credential
          description: A W3C Verifiable Credential as per the W3C VC Data Model. Treated as an opaque object
            at the schema layer.
          type: object
          additionalProperties: true

        - title: Document Credential
          description: A document attachment used as a credential.
          $ref: "https://schema.beckn.io/Document"
