openapi: 3.1.1
info:
  title: Beckn Skill Schema
  description: Schema definition for Skill in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Skill:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          enum:
          - Skill
        category:
          $ref: 'https://schema.beckn.io/CategoryCode.yaml'
        descriptor:
          $ref: 'https://schema.beckn.io/Descriptor.yaml'
        id:
          type: string
      required:
      - '@context'
      - '@type'
      - id
      - descriptor
      additionalProperties: false
