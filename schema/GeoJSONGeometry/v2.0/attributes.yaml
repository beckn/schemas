openapi: 3.1.1
info:
  title: Beckn GeoJSONGeometry Schema
  description: Schema definition for GeoJSONGeometry in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    GeoJSONGeometry:
      description: "**GeoJSON geometry** per RFC 7946. Coordinates are in **EPSG:4326\
        \ (WGS-84)** and MUST follow **[longitude, latitude, (altitude?)]** order.\n\
        Supported types: - Point, LineString, Polygon - MultiPoint, MultiLineString,\
        \ MultiPolygon - GeometryCollection (uses `geometries` instead of `coordinates`)\n\
        Notes: - For rectangles, use a Polygon with a single linear ring where the\
        \ first\n  and last positions are identical.\n- Circles are **not native**\
        \ to GeoJSON. For circular searches, use\n  `SpatialConstraint` with `op:\
        \ s_dwithin` and a Point + `distanceMeters`,\n  or approximate the circle\
        \ as a Polygon.\n- Optional `bbox` is `[west, south, east, north]` in degrees.\n"
      type: object
      properties:
        bbox:
          description: Optional bounding box `[west, south, east, north]` in degrees.
          type: array
          minItems: 4
          maxItems: 4
        coordinates:
          description: Coordinates per RFC 7946 for all types **except** GeometryCollection.
            Order is **[lon, lat, (alt)]**. For Polygons, this is an array of linear
            rings; each ring is an array of positions.
          type: array
        geometries:
          description: Member geometries when `type` is **GeometryCollection**.
          type: array
          items:
            $ref: 'https://schema.beckn.io/GeoJSONGeometry.yaml'
        type:
          type: string
          enum:
          - Point
          - LineString
          - Polygon
          - MultiPoint
          - MultiLineString
          - MultiPolygon
          - GeometryCollection
      required:
      - type
      additionalProperties: true
