openapi: 3.1.1
info:
  title: MediaSearchOptions
  version: 2.0.0
  description: How the discovery engine should use the provided media inputs.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    MediaSearchOptions:
      $id: https://schema.beckn.io/MediaSearchOptions/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: How the discovery engine should use the provided media inputs.
      title: MediaSearchOptions
      type: object
      properties:
        goals:
          description: Desired processing goals for the media.
          type: array
          items:
            type: string
            enum:
            - visual-similarity
            - visual-object-detect
            - text-from-image
            - text-from-audio
            - semantic-audio-match
            - semantic-video-match
        augment_text_search:
          type: boolean
        restrict_results_to_media_proximity:
          type: boolean
      additionalProperties: false
      x-tags:
      - common
