openapi: 3.1.1
info:
  title: UpdateAction
  version: 2.0.0
  description: 'Beckn /beckn/update action envelope. Sent by a BAP to a BPP to request
    changes to an active contract (e.g., update fulfillment address, add items, change
    quantities). The context.try flag must be true during negotiation.

    '
paths: {}
components:
  schemas:
    UpdateAction:
      $id: https://schema.beckn.io/UpdateAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/update action envelope. Sent by a BAP to a BPP to
        request changes to an active contract (e.g., update fulfillment address, add
        items, change quantities). The context.try flag must be true during negotiation.

        '
      title: UpdateAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/update
        message:
          type: object
          additionalProperties: true
          properties:
            contract:
              $ref: https://schema.beckn.io/Contract/attributes.yaml#/components/schemas/Contract
          required:
          - contract
      required:
      - context
      - message
      x-tags:
      - common
