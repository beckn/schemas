openapi: 3.1.1
info:
  title: Beckn UpdateAction Schema
  description: Schema definition for the Beckn /beckn/update action envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    UpdateAction:
      description: >
        Beckn /beckn/update action envelope. Sent by a BAP to a BPP to request
        changes to an active contract (e.g., update fulfillment address, add items,
        change quantities). The context.try flag must be true during negotiation.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/update
        message:
          type: object
          additionalProperties: true
          properties:
            contract:
              allOf:
                - $ref: 'https://schema.beckn.io/Contract.yaml'
          required:
            - contract
      required:
        - context
        - message
