        vehicleCategory:
          $ref: '#/components/schemas/VehicleCategory'
        features:
          type: array
          items:
            type: object
            description: Reference to Feature
        accessibilityFeatures:
          type: array
          items:
            type: object
            description: Reference to AccessibilityFeature
    RideRequest:
      type: object
