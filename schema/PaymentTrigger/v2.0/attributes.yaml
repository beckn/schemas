components:
  schemas:
    PaymentTrigger:
      description: Describes when in the order lifecycle a payment flow should be
        triggered. Typically useful for initiating checkouts and settlement flows.
      type: string
      enum:
      - PRE_ORDER
      - PRE_FULFILLMENT
      - ON_FULFILLMENT
      - POST_FULFILLMENT
