openapi: 3.1.1
info:
  title: Location
  version: 2.0.0
  description: A **place** represented by **GeoJSON geometry** (Point/Polygon/Multi*)
    and optional human-readable `address`. This unifies all Beckn location fields
    into a single, widely-adopted representation (GeoJSON).
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    Location:
      description: 'A place represented by GeoJSON geometry and optional address.

        Source: main/schema/core/v2/attributes.yaml#Location'
      type: object
      required:
      - geo
      additionalProperties: false
      properties:
        geo:
          $ref: https://schema.beckn.io/GeoJSONGeometry/v2.0/attributes.yaml#/components/schemas/GeoJSONGeometry
        address:
          $ref: https://schema.beckn.io/Address/v2.0/attributes.yaml#/components/schemas/Address
