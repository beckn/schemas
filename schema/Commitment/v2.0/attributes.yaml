openapi: 3.1.1
info:
  title: Commitment
  version: 2.0.0
  description: This schema is part of the Long Term Support of Beckn Protocol V2.0
    API specification and MUST NOT be extended. Any domain-specific extension must
    use the property of this schema which is of type Attribute.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    Commitment:
      type: object
      required:
      - status
      - resources
      - offer
      properties:
        id:
          type: string
        status:
          type: object
          properties:
            descriptor:
              allOf:
              - $ref: https://schema.beckn.io/Descriptor/v2.1/attributes.yaml#/components/schemas/Descriptor
              - properties:
                  code:
                    enum:
                    - DRAFT
                    - ACTIVE
                    - CLOSED
        resources:
          type: array
          items:
            required:
            - id
            - quantity
            $ref: https://schema.beckn.io/Resource/v2.0/attributes.yaml#/components/schemas/Resource
        offer:
          required:
          - id
          - resourceIds
          $ref: https://schema.beckn.io/Offer/v2.1/attributes.yaml#/components/schemas/Offer
        commitmentAttributes:
          description: Domain-specific extension attributes for this commitment.
          allOf:
          - $ref: https://schema.beckn.io/Attributes/v2.0/attributes.yaml#/components/schemas/Attributes
          - properties: {}
