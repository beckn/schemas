$id: "https://schema.beckn.io/BecknEndpoint/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
title: BecknEndpoint
x-tags: [common]
description: >-
  A Beckn protocol endpoint identifier. Must start with the prefix "beckn/"
  followed by one or more lowercase segments (letters and underscores only)
  separated by forward slashes. Standard endpoints are listed in the examples
  below. New actors may define extension endpoints without modifying this
  schema — the pattern accepts any conforming beckn/ prefixed string.
type: string
pattern: '^beckn\/[a-z_]+(?:\/[a-z_]+)*$'
examples:
- beckn/discover
- beckn/on_discover
- beckn/select
- beckn/on_select
- beckn/init
- beckn/on_init
- beckn/confirm
- beckn/on_confirm
- beckn/status
- beckn/on_status
- beckn/track
- beckn/on_track
- beckn/update
- beckn/on_update
- beckn/cancel
- beckn/on_cancel
- beckn/rate
- beckn/on_rate
- beckn/support
- beckn/on_support
