openapi: 3.1.1
info:
  title: Beckn PriceSpecification Schema
  description: Schema definition for PriceSpecification in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    PriceSpecification:
      type: object
      additionalProperties: true
      properties:
        currency:
          type: string
          description: ISO 4217 code
        value:
          type: number
          description: Total value for this price specification
        applicableQuantity:
          $ref: 'https://schema.beckn.io/Quantity.yaml'
          x-jsonld:
            '@id': schema:eligibleQuantity
        components:
          type: array
          description: Optional components (tax, shipping, discount, fee, surcharge)
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                - UNIT
                - TAX
                - DELIVERY
                - DISCOUNT
                - FEE
                - SURCHARGE
              value:
                type: number
              currency:
                type: string
              description:
                type: string
        x-jsonld:
          '@id': schema:PriceSpecification
