openapi: 3.1.1
info:
  title: Beckn Organization Schema
  description: Schema definition for Organization in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Organization:
      type: object
      description: An organization such as a company, non-profit, or governmental
        institution. Modeled after schema.org/Organization.
      properties:
        '@context':
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          default: schema:Organization
        id:
          type: string
          description: Unique identifier for the organization
          x-jsonld:
            '@id': schema:identifier
        name:
          type: string
          description: Name of the organization
          x-jsonld:
            '@id': schema:name
        email:
          type: string
          format: email
          description: Email address
          x-jsonld:
            '@id': schema:email
        telephone:
          type: string
          description: Telephone number
          x-jsonld:
            '@id': schema:telephone
        address:
          description: Physical address
          oneOf:
          - type: string
          - $ref: 'https://schema.beckn.io/Address.yaml'
          x-jsonld:
            '@id': schema:address
        credentials:
          type: array
          description: Credentials held by the organization
          items:
            $ref: 'https://schema.beckn.io/Credential.yaml'
          x-jsonld:
            '@id': schema:hasCredential
        skills:
          type: array
          description: Skills or capabilities of the organization
          items:
            $ref: 'https://schema.beckn.io/Skill.yaml'
          x-jsonld:
            '@id': schema:hasSkill
        organizationAttributes:
          description: Extensible attribute pack for jurisdictional or domain-specific
            organization properties
          allOf:
          - $ref: 'https://schema.beckn.io/Attributes.yaml'
      required:
      - '@context'
      - '@type'
      - id
      additionalProperties: false
