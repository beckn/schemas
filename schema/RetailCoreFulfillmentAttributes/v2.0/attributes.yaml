openapi: 3.1.1
info:
  title: RetailCoreFulfillmentAttributes
  version: 2.0.0
  description: 'Retail-specific fulfillment attribute pack extending Beckn core Fulfillment.
    Used as the value of Fulfillment.fulfillmentAttributes for retail domain fulfillments.
    Covers supported fulfillment types, delivery endpoint, operating schedule, SLA
    semantics, and handling constraints.

    '
paths: {}
components:
  schemas:
    RetailCoreFulfillmentAttributes:
      $id: https://schema.beckn.io/RetailCoreFulfillmentAttributes/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Retail-specific fulfillment attribute pack extending Beckn core
        Fulfillment. Used as the value of Fulfillment.fulfillmentAttributes for retail
        domain fulfillments. Covers supported fulfillment types, delivery endpoint,
        operating schedule, SLA semantics, and handling constraints.

        '
      title: RetailCoreFulfillmentAttributes
      x-tags:
      - retail
      type: object
      properties:
        '@context':
          description: JSON-LD context URI for the retail fulfillment schema.
          type: string
          format: uri
        '@type':
          description: JSON-LD type for this attribute pack.
          type: string
          const: beckn:RetailCoreFulfillmentAttributes
        supportedFulfillmentTypes:
          type: array
          description: Fulfillment modes supported by this provider for this offer.
          items:
            type: string
            enum:
            - DELIVERY
            - PICKUP
            - DINE_IN
        deliveryDetails:
          type: object
          description: Delivery endpoint details for DELIVERY fulfillment type.
          additionalProperties: false
          properties:
            address:
              description: Delivery address. Can be a structured Address or free-text
                string.
              oneOf:
              - type: string
              - $ref: https://schema.beckn.io/Address/attributes.yaml#/components/schemas/Address
            contact:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                phone:
                  type: string
        operatingHours:
          type: array
          description: Recurring store operating schedule.
          items:
            type: object
            additionalProperties: false
            properties:
              daysOfWeek:
                type: array
                items:
                  type: string
              timeRange:
                type: object
                additionalProperties: false
                required:
                - start
                - end
                properties:
                  start:
                    type: string
                  end:
                    type: string
        closures:
          type: array
          description: Explicit closure periods overriding operatingHours.
          items:
            type: object
            additionalProperties: false
            properties:
              startDate:
                type: string
                format: date-time
              endDate:
                type: string
                format: date-time
        sla:
          type: object
          additionalProperties: false
          description: 'Service level agreement for fulfillment. Indicates expected
            time bounds from the defined lifecycle event.

            '
          properties:
            min:
              type: string
              description: Minimum fulfillment time (ISO 8601 duration).
            max:
              type: string
              description: Maximum fulfillment time (ISO 8601 duration).
            unitBasis:
              type: string
              enum:
              - ORDER_CONFIRMATION
              - PACKING_COMPLETE
              - DISPATCH
              description: Lifecycle event from which SLA is measured.
        handling:
          type: array
          description: Special handling requirements for this fulfillment.
          items:
            type: string
            enum:
            - FRAGILE
            - COLD_CHAIN
            - TEMPERATURE_CONTROLLED
            - HAZARDOUS
            - OVERSIZED
            - BULK
            - HIGH_VALUE
            - LIQUID
            - PERISHABLE
      required:
      - '@context'
      - '@type'
      additionalProperties: true
