openapi: 3.1.1
info:
  title: SelectAction
  version: 2.0.0
  description: 'Beckn /beckn/select action envelope. Sent by a BAP to a BPP to select
    items and offers from a catalog, initiating the negotiation cycle.

    '
paths: {}
components:
  schemas:
    SelectAction:
      $id: https://schema.beckn.io/SelectAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/select action envelope. Sent by a BAP to a BPP to
        select items and offers from a catalog, initiating the negotiation cycle.

        '
      title: SelectAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/select
        message:
          type: object
          additionalProperties: true
          properties:
            contract:
              $ref: https://schema.beckn.io/Contract/attributes.yaml#/components/schemas/Contract
          required:
          - contract
      required:
      - context
      - message
      x-tags:
      - common
