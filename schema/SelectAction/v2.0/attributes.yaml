$id: "https://schema.beckn.io/SelectAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/select action envelope. Sent by a BAP to a BPP to select items and offers from a catalog, initiating
  the negotiation cycle.

  '
title: SelectAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
    - type: object
      properties:
        action:
          type: string
          const: beckn/select
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract/v2.0"
    required:
    - contract
required:
- context
- message
