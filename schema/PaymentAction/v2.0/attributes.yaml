openapi: 3.1.1
info:
  title: Beckn PaymentAction Schema
  description: Schema definition for PaymentAction in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    PaymentAction:
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          const: beckn:PaymentAction
        amount:
          description: Amount associated with this payment action
          type: object
          properties:
            currency:
              type: string
              x-jsonld:
                '@id': schema:priceCurrency
            value:
              type: number
              x-jsonld:
                '@id': schema:price
        paymentStatus:
          description: Payment lifecycle status (Pending | Authorized | Captured |
            Failed | Refunded | PartialRefund …)
          type: string
          enum:
          - INITIATED
          - PENDING
          - AUTHORIZED
          - CAPTURED
          - COMPLETED
          - FAILED
          - CANCELLED
          - REFUNDED
          - PARTIALLY_REFUNDED
          - CHARGEBACK
          - DISPUTED
          - EXPIRED
          - REVERSED
          - VOIDED
          - SETTLED
          - ON_HOLD
          - ADJUSTED
          x-jsonld:
            '@id': beckn:paymentStatus
        paymentMethod:
          type: object
          '@context':
            type: string
            format: uri
            const: https://schema.beckn.io/
          '@type':
            type: string
            const: PaymentMethod
          method:
            type: string
        paymentUrl:
          description: URL for payment processing/redirection
          type: string
          x-jsonld:
            '@id': schema:url
          format: uri
          example: https://payments.example.com/pay?transactionId=123&amount=100
        state:
          $ref: 'https://schema.beckn.io/State.yaml'
        txnRef:
          description: PSP/gateway/bank transaction reference
          type: string
          x-jsonld:
            '@id': schema:transactionNumber
        checkoutAt:
          $ref: 'https://schema.beckn.io/CheckoutTerminal.yaml'
        paidAt:
          description: The time at which the payment was made
          type: string
          format: date-time
        paymentActionAttributes:
          description: Extensible set of attributes containing payment actions specific
            to each ecosystem.
          allOf:
          - $ref: 'https://schema.beckn.io/Attributes.yaml'
      required:
      - '@context'
      - '@type'
      - paymentStatus
      additionalProperties: false
