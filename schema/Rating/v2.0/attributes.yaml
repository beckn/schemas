openapi: 3.1.1
info:
  title: Beckn Rating Schema
  description: Schema definition for Rating in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Rating:
      type: object
      description: Aggregated rating information for an entity. Aligns with schema.org/AggregateRating
        semantics.
      properties:
        '@context':
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          default: schema:AggregateRating
        ratingValue:
          description: Rating value (typically 0-5)
          type: number
          minimum: 0
          maximum: 5
          x-jsonld:
            '@id': schema:ratingValue
        ratingCount:
          description: Number of ratings
          type: integer
          minimum: 0
          x-jsonld:
            '@id': schema:ratingCount
        reviewText:
          description: Optional textual review or comment
          type: string
          x-jsonld:
            '@id': schema:reviewBody
      additionalProperties: false
