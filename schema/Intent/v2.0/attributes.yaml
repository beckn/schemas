openapi: 3.1.1
info:
  title: Intent
  version: 2.0.0
  description: A declaration of an intent to discover catalogs.
paths: {}
components:
  schemas:
    Intent:
      $id: https://schema.beckn.io/Intent/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: A declaration of an intent to discover catalogs.
      title: Intent
      x-tags:
      - common
      type: object
      properties:
        text_search:
          description: Free text search query for items (legacy snake_case alias)
          type: string
          example: gaming laptop premium tech
        textSearch:
          description: Free text search query for items
          type: string
          example: gaming laptop premium tech
        filters:
          description: Filter criteria for items
          type: object
          properties:
            type:
              description: Type of filter expression
              type: string
              enum:
              - jsonpath
              default: jsonpath
            expression:
              description: Filter expression based on the specified type
              type: string
              example: $[?(@.rating.value >= 4.0 && @.electronic.brand.name == 'Premium
                Tech')]
          required:
          - type
          - expression
        spatial:
          description: Optional array of spatial constraints (CQL2-JSON semantics).
          type: array
          items:
            $ref: https://schema.beckn.io/SpatialConstraint/attributes.yaml#/components/schemas/SpatialConstraint
        media_search:
          $ref: https://schema.beckn.io/MediaSearch/attributes.yaml#/components/schemas/MediaSearch
      anyOf:
      - required:
        - text_search
      - required:
        - textSearch
      - required:
        - filters
      - required:
        - spatial
      - required:
        - filters
        - spatial
      additionalProperties: false
