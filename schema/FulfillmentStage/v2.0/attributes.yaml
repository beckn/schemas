$id: https://schema.beckn.io/FulfillmentStage/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: Schema definition for FulfillmentStage in the Beckn Protocol v2.0.1
title: FulfillmentStage
type: object
properties:
  '@context':
    description: CPD
    type: string
    format: uri
    const: https://schema.beckn.io/
  '@type':
    type: string
    default: beckn:FulfillmentStage
  id:
    description: A unique identifier for this stage of fulfillment
    type: string
  instructions:
    description: A set of instructions to follow during this stage of fulfillment
    type: array
    items:
      $ref: https://schema.beckn.io/Instruction/v2.0
  preferences:
    description: A extensible set of attributes that describe the fulfillment preferences
    type: array
    items:
      $ref: https://schema.beckn.io/Attributes/v2.0
  start:
    description: An extensible set of attributes that describe the criteria required to start this stage
      of fulfillment
    type: object
    allOf:
      $ref: https://schema.beckn.io/FulfillmentStageEndpoint/v2.0
  end:
    description: An extensible set of attributes that describe the criteria required to end this stage
      of fulfillment
    allOf:
      $ref: https://schema.beckn.io/FulfillmentStageEndpoint/v2.0
  fulfillmentStageAttributes:
    description: An extensible set of attributes that describe this stage of fulfillment
    allOf:
      $ref: https://schema.beckn.io/Attributes/v2.0
x-jsonld:
  '@id': beckn:fulfillmentStage
required:
- '@context'
- '@type'
- id
- location
additionalProperties: false
