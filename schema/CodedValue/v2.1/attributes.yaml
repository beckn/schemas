openapi: 3.1.1
info:
  title: "CodedValue \u2014 Shared Type"
  version: 2.1.0
  description: 'Standard pattern for authority-governed code values. Used wherever
    a field''s valid values are defined by an external standards body (e.g. ISIC industry
    codes, NSQF/ISCED domain codes, NQF qualification levels). Provides international
    neutrality by abstracting the code system authority.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
components:
  schemas:
    CodedValue:
      type: object
      description: 'An authority-governed code value. The @context URI identifies
        the code system authority (e.g. UN ISIC, UNESCO ISCED, India NSQF). The @type
        identifies the class of code within that system. The code is the actual value.
        This pattern avoids hardcoding country-specific enumerations into the schema.

        '
      required:
      - code
      properties:
        code:
          type: string
          description: 'The actual code value as defined by the authority. Examples:
            "8299" (ISIC: other business support), "0613" (ISCED: software), "4" (NSQF
            Level 4).

            '
          x-jsonld-id: cv:code
        label:
          type: string
          description: Human-readable label for the code (optional, for display).
          x-jsonld-id: cv:label
