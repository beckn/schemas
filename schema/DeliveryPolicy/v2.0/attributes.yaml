openapi: 3.1.1
info:
  title: DeliveryPolicy
  version: 2.0.0
  description: 'Callback delivery retry configuration


    This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification
    and MUST NOT be extended. Any domain-specific extension must use the property
    of this schema which is of type Attribute.'
paths: {}
components:
  schemas:
    DeliveryPolicy:
      type: object
      description: 'Callback delivery retry configuration


        This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification
        and MUST NOT be extended. Any domain-specific extension must use the property
        of this schema which is of type Attribute.'
      properties:
        timeoutSeconds:
          type: integer
          default: 30
          description: Per-request HTTP timeout in seconds
        maxPayloadBytes:
          type: integer
          description: Maximum callback payload size in bytes
        retryPolicy:
          type: object
          properties:
            maxRetries:
              type: integer
              default: 5
              description: Maximum retry attempts before sending to DLT
            initialDelaySeconds:
              type: integer
              default: 5
              description: Base delay before first retry
            maxDelaySeconds:
              type: integer
              default: 300
              description: Maximum delay cap for exponential backoff
            backoffMultiplier:
              type: number
              default: 2.0
              description: Delay multiplied by this after each retry
      x-lts: true
