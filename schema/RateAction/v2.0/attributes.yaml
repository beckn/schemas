openapi: 3.1.1
info:
  title: Beckn RateAction Schema
  description: Schema definition for the Beckn /beckn/rate action envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    RateAction:
      description: >
        Beckn /beckn/rate action envelope. Sent by a BAP to a BPP to submit
        one or more rating inputs for entities in a completed contract
        (order, fulfillment, item, provider, agent, support).
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/rate
        message:
          type: object
          additionalProperties: true
          properties:
            ratingInputs:
              type: array
              items:
                $ref: 'https://schema.beckn.io/RatingInput.yaml'
          required:
            - ratingInputs
      required:
        - context
        - message
