openapi: 3.1.1
info:
  title: Beckn FulfillmentAgent Schema
  description: Schema definition for FulfillmentAgent in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    FulfillmentAgent:
      description: The entity directly involved in fulfilling the order. It could
        be a person, an organization, a machine, a software application, or an AI
        Agent.
      allOf:
      - type: object
        additionalProperties: false
        properties:
          '@context':
            description: CPD
            type: string
            format: uri
            const: https://schema.beckn.io/
          '@type':
            type: string
            const: beckn:Agent
            x-jsonld:
              '@id': schema:Thing
          agentAttributes:
            description: 'Attribute Pack reference for richer identity: # agent/identity.v1
              (contact details: email, phone, address) # agent/org-ids.v1 (LEI, GSTIN,
              ISIN, CUSIP…) # consumer/kyc.v1 (jurisdictional compliance fields) #
              (accessibility needs, etc.)

              '
            $ref: 'https://schema.beckn.io/Attributes.yaml'
        required:
        - '@context'
        - '@type'
      - oneOf:
        - type: object
          additionalProperties: false
          properties:
            person:
              $ref: 'https://schema.beckn.io/Person.yaml'
          required:
          - person
        - type: object
          additionalProperties: false
          properties:
            organization:
              $ref: 'https://schema.beckn.io/Organization.yaml'
          required:
          - organization
