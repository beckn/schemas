$id: "https://schema.beckn.io/Tracking/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: Non-streaming tracking handle per legacy semantics (url/transport/status).
title: Tracking
type: object
properties:
  '@context':
    description: TBD
    type: string
    format: uri
    default: "https://schema.beckn.io/"
  '@type':
    description: TBD
    type: string
    default: beckn:Tracking
  expiresAt:
    description: ISO 8601 expiry timestamp for the tracking handle.
    type: string
    format: date-time
  trackingStatus:
    type: string
    enum:
    - ACTIVE
    - DISABLED
    - COMPLETED
  url:
    description: Link/handle to off-network tracking UI or endpoint.
    type: string
    format: uri
required:
- '@context'
- '@type'
- url
- trackingStatus
x-jsonld:
  '@type': schema:TrackAction
  trackingStatus: $.trackingStatus
  schema:target: $.url
additionalProperties: false
