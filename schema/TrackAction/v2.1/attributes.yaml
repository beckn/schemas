$id: https://schema.beckn.io/TrackAction/v2.1
$schema: https://json-schema.org/draft/2020-12/schema
description: 'Beckn /beckn/track action envelope. Sent by a BAP to a BPP to request a real-time tracking handle for a fulfillment within an active contract.

  '
title: TrackAction
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/track
  message:
    type: object
    additionalProperties: true
    properties:
      tracking:
        $ref: https://schema.beckn.io/TrackingRequest/v2.0
    required:
    - tracking
required:
- context
- message
x-tags:
- common
