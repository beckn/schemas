openapi: 3.1.1
info:
  title: Beckn TrackAction Schema
  description: Schema definition for the Beckn /beckn/track action envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    TrackAction:
      description: >
        Beckn /beckn/track action envelope. Sent by a BAP to a BPP to request
        a real-time tracking handle for a fulfillment within an active contract.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/track
        message:
          type: object
          additionalProperties: true
          properties:
            tracking:
              allOf:
                - $ref: 'https://schema.beckn.io/TrackingRequest.yaml'
          required:
            - tracking
      required:
        - context
        - message
