openapi: 3.1.1
info:
  title: Beckn DiscoverAction Schema
  description: Schema definition for the Beckn /beckn/discover action envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    DiscoverAction:
      description: >
        Beckn /beckn/discover action envelope. Sent by a BAP to a BPP (or
        registry) to discover catalogs matching a given intent.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/discover
        message:
          type: object
          additionalProperties: true
          properties:
            intent:
              allOf:
                - $ref: 'https://schema.beckn.io/Intent.yaml'
          required:
            - intent
      required:
        - context
        - message
