openapi: 3.1.1
info:
  title: DiscoverAction
  version: 2.0.0
  description: 'Beckn /beckn/discover action envelope. Sent by a BAP to a BPP (or
    registry) to discover catalogs matching a given intent.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    DiscoverAction:
      title: Discover Action (External)
      description: 'Beckn /beckn/discover message payload as published at schema.beckn.io.

        Requires all discover qualifiers to be nested inside an `intent`

        container object.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      type: object
      properties:
        intent:
          $ref: https://schema.beckn.io/Intent/v2.0/attributes.yaml#/components/schemas/Intent
        text_search:
          type: string
          description: Legacy flat free-text discover query
        textSearch:
          type: string
          description: Flat free-text discover query
      additionalProperties: false
      required:
      - intent
