$id: https://schema.beckn.io/DiscoverAction/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: 'Beckn /beckn/discover action envelope. Sent by a BAP to a BPP (or registry) to discover catalogs matching a given intent.

  '
title: DiscoverAction
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/discover
  message:
    oneOf:
    - type: object
      properties:
        intent:
          $ref: https://schema.beckn.io/Intent/v2.0
      required:
      - intent
      additionalProperties: false
    - $ref: https://schema.beckn.io/Intent/v2.0
required:
- context
- message
x-tags:
- common
