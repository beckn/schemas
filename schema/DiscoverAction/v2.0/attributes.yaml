openapi: 3.1.1
info:
  title: DiscoverAction
  version: 2.0.0
  description: 'Beckn /beckn/discover action envelope. Sent by a BAP to a BPP (or registry) to discover catalogs matching a given intent.

    '
  license:
    name: CC-BY-NC-SA-4.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    DiscoverAction:
      $id: https://schema.beckn.io/DiscoverAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/discover action envelope. Sent by a BAP to a BPP (or registry) to discover catalogs matching a given intent.

        '
      title: DiscoverAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/discover
        message:
          oneOf:
          - type: object
            properties:
              intent:
                $ref: https://schema.beckn.io/Intent/attributes.yaml#/components/schemas/Intent
            required:
            - intent
            additionalProperties: false
          - $ref: https://schema.beckn.io/Intent/attributes.yaml#/components/schemas/Intent
      required:
      - context
      - message
      x-tags:
      - common
