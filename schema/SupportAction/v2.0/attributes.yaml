openapi: 3.1.1
info:
  title: SupportAction
  version: 2.0.0
  description: 'Beckn /beckn/support action envelope. Sent by a BAP to a BPP to request support contact information or to open a support ticket for an existing order/contract.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    SupportAction:
      $id: https://schema.beckn.io/SupportAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/support action envelope. Sent by a BAP to a BPP to request support contact information or to open a support ticket for an existing order/contract.

        '
      title: SupportAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/support
        message:
          type: object
          additionalProperties: true
          properties:
            supportRequest:
              $ref: https://schema.beckn.io/SupportRequest/attributes.yaml#/components/schemas/SupportRequest
          required:
          - supportRequest
      required:
      - context
      - message
      x-tags:
      - common
