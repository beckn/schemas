openapi: 3.1.1
info:
  title: Beckn Document Schema
  description: Schema definition for Document in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Document:
      description: A document, that can be parsed, printed, download or displayed.
        This has intentionally been kept separate from MediaFile as they may contain
        additional attributes like signature, schema etc.
      type: object
      properties:
        label:
          description: The display name of the media file
          type: string
        mimeType:
          description: MIME type if 'data' is provided (application/pdf, image/png, application/json).
          type: string
        standard:
          description: Describes the schema type in case the document follows a standard
            schema like a verifiableCredential
          type: string
        url:
          description: URL to the document
          type: string
          format: uri
        security:
          type: object
          properties:
            checksum:
              type: string
            checksumAlgorithm:
              type: string
              enum:
              - SHA256
              - SHA512
              - OTHER
            signature:
              type: string
            signatureAlgorithm:
              type: string
              description: e.g., Ed25519, ES256
            keyId:
              type: string
        required:
        - label
        - url
        - mimeType
