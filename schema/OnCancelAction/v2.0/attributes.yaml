$id: "https://schema.beckn.io/OnCancelAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_cancel callback envelope. Sent by a BPP to a BAP in response to a /beckn/cancel call, returning
  the contract with status set to CANCELLED and any applicable cancellation outcome.

  '
title: OnCancelAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context.yaml"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_cancel
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract.yaml"
    required:
    - contract
required:
- context
- message
