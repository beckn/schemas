$id: "https://schema.beckn.io/OnSelectAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_select callback envelope. Sent by a BPP to a BAP in response to a /beckn/select call, with updated
  contract terms.

  '
title: OnSelectAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_select
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract/v2.0"
    required:
    - contract
required:
- context
- message
