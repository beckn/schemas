openapi: 3.1.1
info:
  title: StatusAction
  version: 2.0.0
  description: 'Beckn /beckn/status action envelope. Sent by a BAP to a BPP to request
    the current status of an existing contract/order, identified by its id.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    StatusAction:
      title: Status Action
      description: 'Beckn /beckn/status message payload. Sent by a BAP to a BPP to
        query

        the current state of a contract/order by its identifier.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      properties:
        contract:
          allOf:
          - $ref: https://schema.beckn.io/Contract/v2.0/attributes.yaml#/components/schemas/Contract
          - required:
            - id
      required:
      - contract
