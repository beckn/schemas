openapi: 3.1.1
info:
  title: Beckn StatusAction Schema
  description: Schema definition for the Beckn /beckn/status action envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    StatusAction:
      description: >
        Beckn /beckn/status action envelope. Sent by a BAP to a BPP to request
        the current status of an existing contract/order, identified by its id.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/status
        message:
          type: object
          additionalProperties: true
          properties:
            order:
              type: object
              description: Minimal contract/order reference for the status query.
              properties:
                id:
                  description: Identifier of the contract/order whose status is being queried.
                  allOf:
                    - $ref: 'https://schema.beckn.io/Contract.yaml#/properties/id'
              required:
                - id
          required:
            - order
      required:
        - context
        - message
