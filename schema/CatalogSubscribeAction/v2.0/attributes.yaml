openapi: 3.1.1
info:
  title: CatalogSubscribeAction
  version: 2.0.0
  description: 'Message payload for catalog/subscription.

    At least one of `networkIds` or `schemaTypes` must be non-empty.

    An empty `schemaTypes` array is treated as the wildcard sentinel `"*"`,

    matching all schema types for the specified networks.


    This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification and MUST NOT be extended. Any domain-specific extension must use the property of this schema which is of type Attribute.'
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    CatalogSubscribeAction:
      type: object
      description: 'Message payload for catalog/subscription.

        At least one of `networkIds` or `schemaTypes` must be non-empty.

        An empty `schemaTypes` array is treated as the wildcard sentinel `"*"`,

        matching all schema types for the specified networks.


        This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification and MUST NOT be extended. Any domain-specific extension must use the property of this schema which is of type Attribute.'
      required:
      - subscription
      properties:
        subscription:
          type: object
          required:
          - networkIds
          properties:
            networkIds:
              type: array
              items:
                type: string
              description: Network IDs to subscribe to
            schemaTypes:
              type: array
              items:
                type: string
              description: Schema type URIs to filter on (empty = wildcard)
            callbackUrl:
              type: string
              format: uri
              description: Override callback URL (defaults to context.bapUri)
            deliveryPolicy:
              $ref: https://schema.beckn.io/DeliveryPolicy/attributes.yaml#/components/schemas/DeliveryPolicy
      x-lts: true
