openapi: 3.1.1
info:
  title: RetailItem
  version: 2.1.0
  description: 'A minimal retail item schema for use in Contract.commitments[].commitmentAttributes.


    RetailItem is the foundational schema for items in retail transactions.

    It extends beckn:Resource with the core retail item properties: price, quantity,

    and verifiable credentials. Domain-specific schemas (e.g. FoodAndBeverageItem)

    extend RetailItem with additional domain-specific attributes.


    Inheritance: beckn:Resource ← beckn:RetailItem

    Use in: beckn:Commitment.commitmentAttributes for retail orders

    '
paths: {}
components:
  schemas:
    RetailItem:
      $id: https://schema.beckn.io/RetailItem/v2.1
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'A minimal retail item schema for use in Contract.commitments[].commitmentAttributes.


        RetailItem is the foundational schema for items in retail transactions.

        It extends beckn:Resource with the core retail item properties: price, quantity,

        and verifiable credentials. Domain-specific schemas (e.g. FoodAndBeverageItem)

        extend RetailItem with additional domain-specific attributes.


        Inheritance: beckn:Resource ← beckn:RetailItem

        Use in: beckn:Commitment.commitmentAttributes for retail orders

        '
      title: RetailItem
      x-tags:
      - retail
      allOf:
      - $ref: https://schema.beckn.io/Attributes/attributes.yaml#/components/schemas/Attributes
      - type: object
        properties:
          '@context':
            type: string
            format: uri
            const: https://schema.beckn.io/RetailItem/v2.1/context.jsonld
            description: JSON-LD context URI for the RetailItem schema.
          '@type':
            type: string
            const: beckn:RetailItem
            description: JSON-LD type.
          resourceId:
            type: string
            description: 'Identifier of the catalog item resource this commitment
              refers to. Corresponds to the item''s id in the Catalog.

              '
            x-jsonld:
              '@id': beckn:resourceId
          lineId:
            type: string
            description: Line item identifier within the contract.
            x-jsonld:
              '@id': beckn:lineId
          offerId:
            type: string
            description: Identifier of the Offer under which this item is purchased.
            x-jsonld:
              '@id': beckn:offerId
          price:
            $ref: https://schema.beckn.io/PriceSpecification/attributes.yaml#/components/schemas/PriceSpecification
            description: 'Unit price specification for this line item. For domain-specific
              pricing, use domain-specific price schema (e.g. beckn:FnBPriceSpecification
              for food & beverage).

              '
            x-jsonld:
              '@id': beckn:price
          quantity:
            type: object
            description: Quantity of this item ordered.
            properties:
              unitCode:
                type: string
                description: 'Unit of measure code (e.g. EA for each, KG for kilograms,
                  LTR for litres, MTR for metres).

                  '
                example: EA
              unitQuantity:
                type: number
                description: Numeric quantity in the given unit.
                minimum: 0
                example: 1
            x-jsonld:
              '@id': beckn:quantity
          credentials:
            type: array
            description: 'External verifiable credentials or attestations associated
              with this item (e.g. FSSAI license, organic certification, ISO standard).

              '
            items:
              type: object
              required:
              - type
              - uri
              properties:
                type:
                  type: string
                  description: Type or scheme of the credential (e.g. FSSAI, ISO,
                    ORGANIC).
                uri:
                  type: string
                  format: uri
                  description: Resolvable URI to the credential or attestation.
                issuer:
                  type: string
                  description: Name or identifier of the issuing authority.
                id:
                  type: string
                  description: Identifier within the issuing authority's system.
            x-jsonld:
              '@id': beckn:credentials
        required:
        - '@context'
        - '@type'
