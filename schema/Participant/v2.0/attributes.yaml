$id: https://schema.beckn.io/Participant/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: Schema definition for Participant in the Beckn Protocol v2.0.1
title: Participant
type: object
properties:
  '@context':
    type: string
    format: uri
    const: https://schema.beckn.io/
  '@type':
    type: string
    default: beckn:Participant
  credentials:
    type: array
    items:
      $ref: https://schema.beckn.io/Credential/v2.0
  displayName:
    type: string
  email:
    type: string
    format: email
  id:
    type: string
  rating:
    $ref: https://schema.beckn.io/Rating/v2.0
  role:
    description: Role of participant (consumer, recipient, rider, patient, operator, etc.)
    type: string
  skills:
    type: array
    items:
      $ref: https://schema.beckn.io/Skill/v2.0
  telephone:
    type: string
required:
- '@context'
- '@type'
- id
- role
additionalProperties: false
x-tags:
- common
