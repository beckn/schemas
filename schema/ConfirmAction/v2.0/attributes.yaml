$id: https://schema.beckn.io/ConfirmAction/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: 'Beckn /beckn/confirm action envelope. Sent by a BAP to a BPP to confirm a contract, finalising the transaction terms agreed during the select–init negotiation cycle.

  '
title: ConfirmAction
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/confirm
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        $ref: https://schema.beckn.io/Contract/v2.0
    required:
    - contract
required:
- context
- message
x-tags:
- common
