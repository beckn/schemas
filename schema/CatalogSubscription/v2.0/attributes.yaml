openapi: 3.1.1
info:
  title: CatalogSubscription
  version: 2.0.0
  description: 'Full subscription record


    This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification
    and MUST NOT be extended. Any domain-specific extension must use the property
    of this schema which is of type Attribute.'
paths: {}
components:
  schemas:
    CatalogSubscription:
      type: object
      description: 'Full subscription record


        This schema is part of the Long Term Support of Beckn Protocol V2.0 API specification
        and MUST NOT be extended. Any domain-specific extension must use the property
        of this schema which is of type Attribute.'
      required:
      - id
      - status
      properties:
        id:
          type: string
          format: uuid
          description: Subscription UUID
        networkIds:
          type: array
          items:
            type: string
          description: Network IDs covered by this subscription
        schemaTypes:
          type: array
          items:
            type: string
          description: Schema type URIs filtered by this subscription (empty = wildcard
            "*")
        callbackUrl:
          type: string
          format: uri
          description: Delivery callback URL
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - DELETED
          description: Lifecycle status of the subscription
        deliveryPolicy:
          $ref: https://schema.beckn.io/DeliveryPolicy/attributes.yaml#/components/schemas/DeliveryPolicy
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      x-lts: true
