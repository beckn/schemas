$id: "https://schema.beckn.io/OnConfirmAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_confirm callback envelope. Sent by a BPP to a BAP in response to a /beckn/confirm call, returning
  the confirmed contract with status set to CONFIRMED.

  '
title: OnConfirmAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_confirm
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract/v2.0"
    required:
    - contract
required:
- context
- message
