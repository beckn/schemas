openapi: 3.1.1
info:
  title: Invoice
  version: 2.1.0
  description: Schema definition for Invoice in the Beckn Protocol v2.0.1
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    Invoice:
      $id: https://schema.beckn.io/Invoice/v2.1
      $schema: https://json-schema.org/draft/2020-12/schema
      description: Schema definition for Invoice in the Beckn Protocol v2.0.1
      title: Invoice
      type: object
      properties:
        '@context':
          description: CPD
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          description: TPD
          type: string
          enum:
          - Invoice
          x-jsonld:
            '@id': schema:Invoice
        dueDate:
          type:
          - string
          - 'null'
          x-jsonld:
            '@id': schema:paymentDueDate
          format: date
        id:
          description: Stable invoice identifier (system id)
          type: string
          x-jsonld:
            '@id': schema:identifier
        invoiceAttributes:
          description: Attribute Pack for tax regime (e.g., GST/VAT), e-invoice refs, legal boilerplate, etc.
          $ref: https://schema.beckn.io/Attributes/attributes.yaml#/components/schemas/Attributes
        issueDate:
          type: string
          x-jsonld:
            '@id': schema:dateIssued
          format: date
        number:
          description: Human-visible invoice number
          type: string
          x-jsonld:
            '@id': schema:confirmationNumber
        payee:
          description: Seller / issuer of the invoice
          x-jsonld:
            '@id': schema:provider
          $ref: https://schema.beckn.io/Provider/attributes.yaml#/components/schemas/Provider
        payer:
          description: consumer being invoiced
          x-jsonld:
            '@id': schema:customer
          $ref: https://schema.beckn.io/Consumer/attributes.yaml#/components/schemas/Consumer
        costBreakup:
          type: array
          items:
            $ref: https://schema.beckn.io/PriceSpecification/attributes.yaml#/components/schemas/PriceSpecification
      required:
      - '@context'
      - '@type'
      - id
      - number
      - issueDate
      - payee
      - payer
      additionalProperties: false
      x-tags:
      - common
