openapi: 3.1.1
info:
  title: MediaSearch
  version: 2.0.0
  description: Container for multimodal search inputs and configuration. Supports
    searching through **images, audio notes, and videos** alongside text, filters,
    and spatial predicates. For GET, this object should be JSON-encoded and URL-escaped.
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    MediaSearch:
      type: object
      properties:
        media:
          type: array
          items:
            $ref: https://schema.beckn.io/MediaInput/v2.0/attributes.yaml#/components/schemas/MediaInput
        options:
          $ref: https://schema.beckn.io/MediaSearchOptions/v2.0/attributes.yaml#/components/schemas/MediaSearchOptions
      additionalProperties: false
