openapi: 3.1.1
info:
  title: Beckn TrackingRequest Schema
  description: Schema definition for TrackingRequest in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    TrackingRequest:
      type: object
      properties:
        id:
          description: Tracking reference identifier
          type: string
        callbackUrl:
          description: Optional callback URL for streaming tracking coordinates/updates
          type: string
          format: uri
        modeHint:
          description: Optional delivery mode for the tracking handle.
          type: string
          enum:
          - LINK_ONLY
          - DEEP_LINK
          - WEBHOOK
          - WS_HANDLE
        trackingDataSchema:
          description: A JSON Schema (2020-12) that describes the structure of trackingData
            payloads.
          $ref: https://json-schema.org/draft/2020-12/schema
      required:
      - id
