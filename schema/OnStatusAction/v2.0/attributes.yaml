$id: "https://schema.beckn.io/OnStatusAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_status callback envelope. Sent by a BPP to a BAP in response to a /beckn/status call (or as
  an unsolicited status push), returning the current state of the contract.

  '
title: OnStatusAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context.yaml"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_status
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: "https://schema.beckn.io/Contract.yaml"
    required:
    - contract
required:
- context
- message
