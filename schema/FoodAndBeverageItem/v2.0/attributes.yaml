$id: https://schema.beckn.io/FoodAndBeverageItem/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: |
  A Beckn schema for a food and beverage item used in F&B ordering and delivery.

  FoodAndBeverageItem is used as the commitmentAttributes value in a
  Contract.commitments[] entry for food and beverage retail transactions.
  It extends beckn:RetailCoreItemAttributes with F&B-specific properties
  such as allergen declarations, cuisine classification, and preparation guidance.

  Inheritance: beckn:RetailCoreItemAttributes ← beckn:FoodAndBeverageItem
  Use in: beckn:Commitment.commitmentAttributes for F&B orders
title: FoodAndBeverageItem
x-tags: [retail, food-and-beverages]
allOf:
  - $ref: 'https://schema.beckn.io/RetailCoreItemAttributes/v2.0'
  - type: object
    properties:
      '@context':
        type: string
        format: uri
        const: 'https://schema.beckn.io/FoodAndBeverageItem/v2.0/context.jsonld'
        description: JSON-LD context URI for the FoodAndBeverageItem schema.
      '@type':
        type: string
        const: 'beckn:FoodAndBeverageItem'
        description: JSON-LD type.
      resourceId:
        type: string
        description: >
          Identifier of the catalog item resource that this commitment refers to.
          Corresponds to the item's id in the Catalog.
        x-jsonld:
          '@id': 'beckn:resourceId'
      lineId:
        type: string
        description: Line item identifier within the contract (for multi-line contracts).
        x-jsonld:
          '@id': 'beckn:lineId'
      offerId:
        type: string
        description: Identifier of the Offer under which this item is purchased.
        x-jsonld:
          '@id': 'beckn:offerId'
      quantity:
        type: object
        description: Quantity of this item ordered.
        properties:
          unitCode:
            type: string
            description: Unit of measure code (e.g. EA for each, KG for kilograms).
            example: EA
          unitQuantity:
            type: number
            description: Numeric quantity in the given unit.
            example: 1
        x-jsonld:
          '@id': 'beckn:quantity'
      price:
        $ref: 'https://schema.beckn.io/PriceSpecification/v2.0'
        description: Unit price breakdown for this line item.
        x-jsonld:
          '@id': 'beckn:price'
      allergens:
        type: array
        description: >
          List of known allergens present in this item.
          Use standard allergen codes where applicable (e.g. GLUTEN, NUTS, DAIRY,
          EGGS, SOY, SHELLFISH, FISH, SESAME).
        items:
          type: string
        x-jsonld:
          '@id': 'beckn:allergens'
      cuisine:
        type: string
        description: >
          Cuisine classification for this item (e.g. Italian, Indian, Mexican,
          American, Chinese, Mediterranean).
        x-jsonld:
          '@id': 'beckn:cuisine'
      preparation:
        type: object
        description: Preparation and storage guidance for this item.
        properties:
          instructions:
            type: string
            description: Preparation or reheating instructions.
          storage:
            type: string
            description: Storage requirements (e.g. Refrigerate, Keep frozen).
          shelfLife:
            type: string
            description: Shelf life expressed as ISO 8601 duration (e.g. P2D for 2 days).
        x-jsonld:
          '@id': 'beckn:preparation'
