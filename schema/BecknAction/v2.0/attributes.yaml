# --- status ---
- if:
    properties:
      context:
        properties:
          action:
            const: beckn/status
  then:
    properties:
      message:
        properties:
          order:
            type: object
            description: Minimal contract/order reference for the status query.
            properties:
              id:
                description: Identifier of the contract/order whose status is being queried.
                type: string
            required:
            - id
        required:
        - order

# --- on_status ---
- if:
    properties:
