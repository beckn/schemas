$id: "https://schema.beckn.io/BecknAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
title: BecknAction
description: >-
  Unified Beckn action envelope. All Beckn API requests and callbacks conform
  to this schema. The context identifies the action being performed; the message
  carries the action-specific payload. Message content is validated via
  if/then dispatch based on context.action. For unknown or extension endpoints,
  no if/then branch applies and message remains unconstrained.

  This schema supersedes RequestAction and CallbackAction, both of which were
  structurally invalid. The request/callback distinction is encoded in the
  context.action value (e.g. beckn/discover vs beckn/on_discover), not in
  a separate schema type.
type: object
properties:
  context:
    description: Transaction context identifying the action, sender, receiver, and correlation IDs.
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
  message:
    description: Action-specific payload. Content constraints applied via if/then dispatch below.
    allOf:
    - $ref: "https://schema.beckn.io/Message/v2.0"
required:
- context
- message
allOf:

# --- discover ---
- if:
    properties:
      context:
        properties:
          action:
            const: beckn/discover
  then:
    properties:
      message:
        properties:
          intent:
            allOf:
            - $ref: "https://schema.beckn.io/Intent/v2.0"
        required:
        - intent

# --- on_discover ---
- if:
    properties:
      context:
        properties:
          action:
            const: beckn/on_discover
  then:
    properties:
      message:
        properties:
          catalogs:
            type: array
            items:
              $ref: "https://schema.beckn.io/Catalog/v2.0"
        required:
        - catalogs

# --- select ---
- if:
    properties:
      context:
        properties:
          action:
            const: beckn/select
  then:
    properties:
      message:
        properties:
          contract:
            allOf:
            - $ref: "https://schema.beckn.io/Contract/v2.0"
        required:
        - contract

# --- on_select ---
- if:
    properties:
      context:
        properties:
          action:
            const: beckn/on_select
  then:
    properties:
      message:
        properties:
          contract:
            allOf:
            - $ref: "https://schema.beckn.io/Contract/v2.0"
        required:
        - contract

# --- init ---
- if:
