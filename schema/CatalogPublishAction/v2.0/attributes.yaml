$id: https://schema.beckn.io/CatalogPublishAction/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
title: CatalogPublishAction
description: |
  Beckn /beckn/catalog_publish message payload. Sent by a BPP to a CDS
  (Catalog Discovery Service) to publish or update one or more catalogs.
  The CDS indexes the catalogs and makes them discoverable.
x-tags: [common]
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/catalog_publish
  message:
    type: object
    required: [catalogs]
    properties:
      catalogs:
        type: array
        minItems: 1
        description: One or more catalogs to be indexed by the CDS.
        items:
          $ref: https://schema.beckn.io/Catalog/v2.1
required:
- context
- message
