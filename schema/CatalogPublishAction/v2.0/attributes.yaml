openapi: 3.1.1
info:
  title: CatalogPublishAction
  version: 2.0.0
  description: 'Beckn /beckn/catalog_publish message payload. Sent by a BPP to a CDS

    (Catalog Discovery Service) to publish or update one or more catalogs.

    The CDS indexes the catalogs and makes them discoverable.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    CatalogPublishAction:
      description: Catalog publish request payload.
      required:
      - catalogs
      type: object
      properties:
        catalogs:
          type: array
          minItems: 1
          items:
            $ref: https://schema.beckn.io/Catalog/v2.1/attributes.yaml#/components/schemas/Catalog
