openapi: 3.1.1
info:
  title: OnTrackAction
  version: 2.0.0
  description: 'Beckn /beckn/on_track callback envelope. Sent by a BPP to a BAP in
    response to a /beckn/track call, returning a Tracking handle with the URL and/or
    WebSocket endpoint for real-time fulfillment tracking.

    '
paths: {}
components:
  schemas:
    OnTrackAction:
      $id: https://schema.beckn.io/OnTrackAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/on_track callback envelope. Sent by a BPP to a BAP
        in response to a /beckn/track call, returning a Tracking handle with the URL
        and/or WebSocket endpoint for real-time fulfillment tracking.

        '
      title: OnTrackAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/on_track
        message:
          type: object
          additionalProperties: true
          properties:
            tracking:
              $ref: https://schema.beckn.io/Tracking/attributes.yaml#/components/schemas/Tracking
          required:
          - tracking
      required:
      - context
      - message
      x-tags:
      - common
