$id: https://schema.beckn.io/OnTrackAction/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: 'Beckn /beckn/on_track callback envelope. Sent by a BPP to a BAP in response to a /beckn/track
  call, returning a Tracking handle with the URL and/or WebSocket endpoint for real-time fulfillment tracking.

  '
title: OnTrackAction
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_track
  message:
    type: object
    additionalProperties: true
    properties:
      tracking:
        allOf:
        - $ref: https://schema.beckn.io/Tracking/v2.1
    required:
    - tracking
required:
- context
- message
x-tags:
- common
