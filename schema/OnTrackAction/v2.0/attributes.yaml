openapi: 3.1.1
info:
  title: Beckn OnTrackAction Schema
  description: Schema definition for the Beckn /beckn/on_track callback envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    OnTrackAction:
      description: >
        Beckn /beckn/on_track callback envelope. Sent by a BPP to a BAP in
        response to a /beckn/track call, returning a Tracking handle with the
        URL and/or WebSocket endpoint for real-time fulfillment tracking.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/on_track
        message:
          type: object
          additionalProperties: true
          properties:
            tracking:
              allOf:
                - $ref: 'https://schema.beckn.io/Tracking.yaml'
          required:
            - tracking
      required:
        - context
        - message
