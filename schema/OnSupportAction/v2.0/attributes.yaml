openapi: 3.1.1
info:
  title: Beckn OnSupportAction Schema
  description: Schema definition for the Beckn /beckn/on_support callback envelope.
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    OnSupportAction:
      description: >
        Beckn /beckn/on_support callback envelope. Sent by a BPP to a BAP in
        response to a /beckn/support call, returning support contact details
        and available channels.
      type: object
      properties:
        context:
          allOf:
            - $ref: 'https://schema.beckn.io/Context.yaml'
            - type: object
              properties:
                action:
                  type: string
                  const: beckn/on_support
        message:
          type: object
          additionalProperties: true
          properties:
            supportInfo:
              allOf:
                - $ref: 'https://schema.beckn.io/SupportInfo.yaml'
          required:
            - supportInfo
      required:
        - context
        - message
