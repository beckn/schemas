$id: "https://schema.beckn.io/OnSupportAction/v2.0"
$schema: "https://json-schema.org/draft/2020-12/schema"
description: 'Beckn /beckn/on_support callback envelope. Sent by a BPP to a BAP in response to a /beckn/support call, returning
  support contact details and available channels.

  '
title: OnSupportAction
type: object
properties:
  context:
    allOf:
    - $ref: "https://schema.beckn.io/Context/v2.0"
    - type: object
      properties:
        action:
          type: string
          const: beckn/on_support
  message:
    type: object
    additionalProperties: true
    properties:
      supportInfo:
        allOf:
        - $ref: "https://schema.beckn.io/SupportInfo/v2.0"
    required:
    - supportInfo
required:
- context
- message
