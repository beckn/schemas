openapi: 3.1.1
info:
  title: FulfillmentStageEndpoint
  version: 2.0.0
  description: 'A stage boundary endpoint (entry or exit) within a fulfillment, such as pickup, handover, warehouse in/out, border crossing, gate entry/exit, security check, etc. May require one or more proofs/permits/tokens/documents.

    '
  license:
    name: CC-BY-NC-SA 4.0 International
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    FulfillmentStageEndpoint:
      $id: https://schema.beckn.io/FulfillmentStageEndpoint/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'A stage boundary endpoint (entry or exit) within a fulfillment, such as pickup, handover, warehouse in/out, border crossing, gate entry/exit, security check, etc. May require one or more proofs/permits/tokens/documents.

        '
      title: FulfillmentStageEndpoint
      type: object
      additionalProperties: false
      properties:
        '@context':
          description: CPD
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          default: beckn:FulfillmentStageEndpoint
        location:
          $ref: https://schema.beckn.io/Location/attributes.yaml#/components/schemas/Location
        time:
          $ref: https://schema.beckn.io/TimePeriod/attributes.yaml#/components/schemas/TimePeriod
        authorization:
          type: array
          description: 'One or more credentials required and/or issued at this endpoint. Includes machine-readable tokens (QR/URL/OTP) and manual documents (IDs, permits).

            '
          items:
            $ref: https://schema.beckn.io/FulfillmentStageAuthorization/attributes.yaml#/components/schemas/FulfillmentStageAuthorization
      x-tags:
      - common
