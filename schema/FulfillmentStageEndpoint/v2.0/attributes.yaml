openapi: 3.1.1
info:
  title: Beckn FulfillmentStageEndpoint Schema
  description: Schema definition for FulfillmentStageEndpoint in the Beckn Protocol
    v2.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    FulfillmentStageEndpoint:
      type: object
      additionalProperties: false
      description: 'A stage boundary endpoint (entry or exit) within a fulfillment,
        such as pickup, handover, warehouse in/out, border crossing, gate entry/exit,
        security check, etc. May require one or more proofs/permits/tokens/documents.

        '
      properties:
        '@context':
          description: CPD
          type: string
          format: uri
          const: https://schema.beckn.io/
        '@type':
          type: string
          default: beckn:FulfillmentStageEndpoint
        location:
          $ref: 'https://schema.beckn.io/Location.yaml'
        time:
          $ref: 'https://schema.beckn.io/TimePeriod.yaml'
        authorization:
          type: array
          description: 'One or more credentials required and/or issued at this endpoint.
            Includes machine-readable tokens (QR/URL/OTP) and manual documents (IDs,
            permits).

            '
          items:
            $ref: 'https://schema.beckn.io/FulfillmentStageAuthorization.yaml'
