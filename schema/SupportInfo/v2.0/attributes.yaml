openapi: 3.1.1
info:
  title: Beckn Support Schema
  description: Schema definition for Support in the Beckn Protocol v2.0.1
  version: 2.0.1
  contact:
    name: Beckn Labs
    url: https://beckn.io
  license:
    name: CC-BY-NC-SA 4.0 International
    url: https://creativecommons.org/licenses/by-nc-sa/4.0/deed.en
components:
  schemas:
    Support:
      description: Canonical support contact for an entity, mapped to schema.org ContactPoint.
      type: object
      properties:
        '@context':
          type: string
          format: uri
          const: https://schema.beckn.io/
        "@type":
          type: string
          const: beckn:Support
        channels:
          description: Available support channels.
          type: array
          items:
            type: string
            enum:
            - PHONE
            - EMAIL
            - WEB
            - CHAT
            - WHATSAPP
            - IN_APP
            - OTHER
        email:
          description: Support email address.
          type: string
          format: email
        hoursAvailable:
          description: Human-readable support hours (local time)
          type: string
        name:
          description: Name of the support organization or contact.
          type: string
        telephone:
          description: Telephone number.
          type: string
        chat:
          description: Embeddable chat endpoint for support.
          type: string
          format: uri
        url:
          description: Generic URL to a support page.
          type: string
          format: uri
        callbackStatus:
          type: string
      required:
      - '@context'
      - "@type"
      additionalProperties: true
