openapi: 3.1.1
info:
  title: OnInitAction
  version: 2.0.0
  description: 'Beckn /beckn/on_init callback envelope. Sent by a BPP to a BAP in response to a /beckn/init call, with the updated contract including payment terms and billing confirmation.

    '
  license:
    name: CC-BY-NC-SA-4.0
  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    OnInitAction:
      $id: https://schema.beckn.io/OnInitAction/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: 'Beckn /beckn/on_init callback envelope. Sent by a BPP to a BAP in response to a /beckn/init call, with the updated contract including payment terms and billing confirmation.

        '
      title: OnInitAction
      type: object
      properties:
        context:
          allOf:
          - $ref: https://schema.beckn.io/Context/attributes.yaml#/components/schemas/Context
          - type: object
            properties:
              action:
                type: string
                const: beckn/on_init
        message:
          type: object
          additionalProperties: true
          properties:
            contract:
              $ref: https://schema.beckn.io/Contract/attributes.yaml#/components/schemas/Contract
          required:
          - contract
      required:
      - context
      - message
      x-tags:
      - common
