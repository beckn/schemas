  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    MediaFile:
      $id: https://schema.beckn.io/MediaFile/v2.0
      $schema: https://json-schema.org/draft/2020-12/schema
      description: A image, audio, or video typically intended for display purposes
      title: MediaFile
      x-tags:
      - common
      type: object
      properties:
        label:
          description: The display name of the media file
          type: string
        mimeType:
          description: MIME type if 'data' is provided (application/pdf, image/png).
          type: string
          example: image/png
        uri:
          description: URL to the document
          type: string
          format: uri
      additionalProperties: false
