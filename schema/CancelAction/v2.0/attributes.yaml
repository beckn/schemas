$id: https://schema.beckn.io/CancelAction/v2.0
$schema: https://json-schema.org/draft/2020-12/schema
description: 'Beckn /beckn/cancel action envelope. Sent by a BAP to a BPP to request cancellation of an
  active contract. Set context.try to true to first retrieve cancellation terms and fees before committing.

  '
title: CancelAction
type: object
properties:
  context:
    allOf:
    - $ref: https://schema.beckn.io/Context/v2.0
    - type: object
      properties:
        action:
          type: string
          const: beckn/cancel
  message:
    type: object
    additionalProperties: true
    properties:
      contract:
        allOf:
        - $ref: https://schema.beckn.io/Contract/v2.0
    required:
    - contract
required:
- context
- message
x-tags:
- common
