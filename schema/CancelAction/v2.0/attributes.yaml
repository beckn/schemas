openapi: 3.1.1
info:
  title: CancelAction
  version: 2.0.0
  description: 'Beckn /beckn/cancel action envelope. Sent by a BAP to a BPP to request
    cancellation of an active contract. Set context.try to true to first retrieve
    cancellation terms and fees before committing.

    '
  license:
