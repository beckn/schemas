  contact:
    name: Beckn Labs
    url: https://beckn.io
paths: {}
components:
  schemas:
    CancelAction:
      title: Cancel Action
      description: 'Beckn /beckn/cancel message payload. Sent by a BAP to a BPP to
        request

        cancellation of an active contract. Set context.try to true to first

        retrieve cancellation terms and fees before committing.

        (Context wrapper stripped; only the message-content portion is inlined.)'
      properties:
        contract:
          allOf:
          - $ref: https://schema.beckn.io/Contract/v2.0/attributes.yaml#/components/schemas/Contract
          - required:
            - id
      required:
      - contract
