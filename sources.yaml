# sources.yaml
# Schema source registry for schema.beckn.io.
#
# Each entry declares a schema source by type:
#
#   type: internal
#     schemaPath is a relative folder path within this repo.
#     The admin console has already cloned this repo — schemas are served
#     directly from schema-sources/<id>/<schemaPath>/.
#
#   type: external
#     schemaPath is a GitHub tree URL that encodes repo + branch + path:
#       https://github.com/<owner>/<repo>/tree/<ref>/<path>
#     The admin console clones the repo into schema-sources/<id>/
#     and the schema-loader serves schemas from schema-sources/<id>/<path>/.
#
# Fields:
#   id          Unique identifier. Used as the directory name under schema-sources/.
#   type        'internal' | 'external'
#   schemaPath  Local folder path (internal) or GitHub tree URL (external).
#   description Human-readable summary.
#   namespace   Canonical JSON-LD namespace URI for this schema set.
#   tags        Domain tags applied to schemas that do not carry x-tags themselves.

sources:

  # ── Beckn Core Schema Registry (internal) ────────────────────────────────────
  # This repo. Contains core protocol schemas plus domain schemas for mobility,
  # logistics, and retail. All schemas carry x-tags per domain.
  - id: beckn-core-v2
    type: internal
    schemaPath: schema
    description: >-
      Beckn Core Schema Registry. Contains core protocol schemas plus domain schemas
      for mobility, logistics, and retail. Schemas are tagged per-domain via x-tags.
    namespace: https://schema.beckn.io
    tags:
      - common
      - mobility
      - logistics
      - retail

  # ── Digital Energy Grid (external) ───────────────────────────────────────────
  # DEG maintains its own schemas in their GitHub repo. schema.beckn.io indexes
  # them via this entry. DEG schemas use OpenAPI components.schemas format.
  - id: beckn-deg-v1
    type: external
    schemaPath: https://github.com/beckn/DEG/tree/main/specification/schema
    description: >-
      Digital Energy Grid domain schemas for P2P energy trading, EV charging,
      and energy grid management. Maintained by the DEG team at FIDE / IEA.
    namespace: https://schema.beckn.io
    tags:
      - energy
      - ev-charging
      - p2p-trading
